replicaCount: 2

image:
  tag: c67b9f241cdbbef0cdfe1cb2bd019fbf3fd09767
  pullPolicy: IfNotPresent

secret:
  databaseURL: "postgres://launchpad:launchpad@postgresql.default.svc.cluster.local:5432/launchpad?sslmode=disable"

ingress:
  host: launchpad.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

canary:
  steps:
    - setWeight: 10
    - analysis: &analysis
        templates:
          - templateName: launchpad-production-success-rate
        args:
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
    - setWeight: 25
    - analysis: *analysis
    - setWeight: 50
    - analysis: *analysis
    - setWeight: 75
    - analysis: *analysis
