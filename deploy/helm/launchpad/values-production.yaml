replicaCount: 2

image:
  tag: d724889a0aa60077cfb33af8e8417be0d9354419
  pullPolicy: IfNotPresent

secret:
  databaseURL: "postgres://launchpad:launchpad@postgresql.default.svc.cluster.local:5432/launchpad?sslmode=disable"

ingress:
  host: launchpad.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

canary:
  steps:
    - setWeight: 10
    - analysis: &analysis
        templates:
          - templateName: launchpad-production-success-rate
        args:
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest
    - setWeight: 25
    - analysis: *analysis
    - setWeight: 50
    - analysis: *analysis
    - setWeight: 75
    - analysis: *analysis
