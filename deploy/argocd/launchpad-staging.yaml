apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: launchpad-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/esuen/launchpad.git
    targetRevision: main
    path: deploy/helm/launchpad
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
