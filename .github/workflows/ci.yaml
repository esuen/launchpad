name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/helm/launchpad/values-staging.yaml'
      - 'deploy/helm/launchpad/values-production.yaml'
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          install-mode: goinstall
          version: v1.64.8

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./... -race -count=1

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/esuen/launchpad:latest
            ghcr.io/esuen/launchpad:${{ github.sha }}

      - name: Update image tags for GitOps
        run: |
          sed -i "s/  tag: .*/  tag: ${{ github.sha }}/" deploy/helm/launchpad/values-staging.yaml
          sed -i "s/  tag: .*/  tag: ${{ github.sha }}/" deploy/helm/launchpad/values-production.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/launchpad/values-staging.yaml deploy/helm/launchpad/values-production.yaml
          git diff --cached --quiet || git commit -m "deploy: update image tag to ${GITHUB_SHA::7}" && git push
